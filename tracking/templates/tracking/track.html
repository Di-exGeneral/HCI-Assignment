{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Your Report</title>
    <link rel="stylesheet" href="{% static 'reports/css/style.css' %}">
</head>
<body>
    <nav>
        <a href="/" class="logo">CommunityFix</a>
        <div>
            <a href="/reports/submit/">Report a Fault</a>
            <a href="/tracking/track/">Track a Report</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Track Your Report</h1>
            <p class="subtitle">Enter your reference number to check the current status of your report.</p>

            <form method="post">
                {% csrf_token %}

                <label>Reference Number</label>
                <input type="text" name="reference" placeholder="Enter your reference number" required>

                <button type="submit" class="btn">Track Report</button>
            </form>
        </div>
    </div>
</body>
</html>
