{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report a Fault</title>
    <link rel="stylesheet" href="{% static 'reports/css/style.css' %}">
   </head>


<body>
    <nav>
        <a href="/" class="logo">CommunityFix</a>
        <div>
            <a href="/reports/submit/">Report a Fault</a>
            <a href="/tracking/track/">Track a Report</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Report a Fault</h1>
            <p class="subtitle">Fill in your details and describe the problem. You will receive a reference number after submission.</p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>

                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter your phone number" required>

                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email address">

		<label>Location</label>
		<input type="text" name="address" id="address-input" placeholder="Enter your address or area">
		<input type="hidden" name="latitude" id="latitude">
		<input type="hidden" name="longitude" id="longitude">

		<label>Fault Type</label>
		<select name="fault_type" required>
   			 <option value="" disabled selected>Select a fault type</option>
			 <option value="water">Water Issue</option>
   			 <option value="electricity">Electricity Fault</option>
   			 <option value="pothole">Pothole</option>
   			 <option value="waste">Waste Collection</option>
   			 <option value="sewage">Sewage Problem</option>
   			 <option value="other">Other</option>
		</select>


                <label>Fault Description</label>
                <textarea name="description" placeholder="Describe the fault in detail" required></textarea>

                <label>Photo of Fault</label>
                <input type="file" name="photo" accept="image/*" required>

                <button type="submit" class="btn">Submit Report</button>
            </form>
        </div>
    </div>

<script src="{% static 'reports/js/submit.js' %}"></script>

</body>
</html>
