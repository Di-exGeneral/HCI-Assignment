{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Report Status</title>
    <link rel="stylesheet" href="{% static 'reports/css/style.css' %}">
</head>
<body>
    <nav>
        <a href="/" class="logo">CommunityFix</a>
        <div>
            <a href="/reports/admin-dashboard/">Admin Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Update Report Status</h1>
            <p class="subtitle">Reference: {{ report.reference_number }}</p>

            <label>Name</label>
            <input type="text" value="{{ report.name }}" disabled>

	    <label>Address</label>
	    <input type="text" value="{{ report.address|default:'Not provided' }}" disabled>

            <label>Fault Type</label>
            <input type="text" value="{{ report.get_fault_type_display }}" disabled>

            <label>Description</label>
            <textarea disabled>{{ report.description }}</textarea>

            {% if report.photo %}
            <label>Photo</label>
            <img src="{{ report.photo.url }}" alt="Fault photo" style="width: 100%; border-radius: 8px; margin-top: 8px;">
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <label>Update Status</label>
                <select name="status" required>
                    {% for value, label in report.STATUS_CHOICES %}
                    <option value="{{ value }}" {% if report.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn">Update Status</button>
            </form>
        </div>
    </div>
</body>
</html>
